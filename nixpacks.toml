providers = ["...", "php", "node"]

[phases.setup]
aptPkgs = [
    "libpng-dev",
    "libjpeg-dev",
    "libwebp-dev",
    "libzip-dev",
    "libonig-dev",
    "libxml2-dev",
    "curl",
    "git",
    "unzip"
]

[phases.install]
cmds = [
    "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-scripts",
    "npm ci"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan package:discover --ansi"
]

[start]
cmd = "bash railway-start.sh"
